version: '3.8'
services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  postgres_data:
